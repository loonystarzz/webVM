<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VM Not Found</title>
<style>
  body { background: #008080; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .window { background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; box-shadow: 2px 2px 0 #000; min-width: 320px; }
  .title { background: linear-gradient(90deg, #800000, #cc0000); color: #fff; font-weight: bold; font-size: 13px; padding: 3px 6px; }
  .body { padding: 20px; font-size: 13px; }
  .body p { margin-bottom: 10px; }
  a { color: #000080; }
  .btn { display: inline-block; background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; padding: 4px 16px; text-decoration: none; color: #000; font-family: 'Courier New', monospace; font-size: 12px; }
</style>
</head>
<body>
<div class="window">
  <div class="title">⚠ VM Not Found</div>
  <div class="body">
    <p>The VM code you entered does not exist or has expired.</p>
    <p>Please check your code and try again.</p>
    <a href="/" class="btn">◀ Go Home</a>
  </div>
</div>
</body>
</html>
